<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 – Stranica nije pronađena | Puls mladih</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --ink: #1a1710;
            --accent: #b8952a;
            --cream: #faf8f0;
            --muted: #8a8070;
            --deep: #111009;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--cream);
            color: var(--ink);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px 24px;
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at 50% 50%, rgba(184,149,42,0.07), transparent 70%);
            pointer-events: none;
        }

        nav {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 16px 8%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(250,248,240,0.92);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(26,23,16,0.08);
            z-index: 100;
        }

        nav img { height: 38px; }

        .nav-back {
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            color: var(--ink);
            font-weight: 600;
            font-size: 0.9rem;
            padding: 8px 20px;
            border: 1.5px solid rgba(26,23,16,0.15);
            border-radius: 100px;
            transition: all 0.3s;
        }

        .nav-back:hover {
            background: var(--ink);
            color: white;
            border-color: var(--ink);
        }

        .content {
            position: relative;
            z-index: 1;
            max-width: 560px;
        }

        .error-number {
            font-family: 'Playfair Display', serif;
            font-size: clamp(8rem, 20vw, 14rem);
            font-weight: 900;
            line-height: 1;
            background: linear-gradient(135deg, #b8952a, #e8c96a, #b8952a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
            animation: fadeSlideUp 0.8s ease both;
        }

        .error-title {
            font-family: 'Playfair Display', serif;
            font-size: clamp(1.4rem, 3vw, 2rem);
            font-weight: 700;
            color: var(--ink);
            margin-bottom: 16px;
            animation: fadeSlideUp 0.9s ease both;
        }

        .error-desc {
            font-size: 1rem;
            color: var(--muted);
            line-height: 1.75;
            margin-bottom: 40px;
            animation: fadeSlideUp 1s ease both;
        }

        .buttons {
            display: flex;
            gap: 14px;
            justify-content: center;
            flex-wrap: wrap;
            animation: fadeSlideUp 1.1s ease both;
        }

        .btn {
            padding: 13px 32px;
            border-radius: 100px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-family: 'DM Sans', sans-serif;
        }

        .btn-primary {
            background: var(--ink);
            color: white;
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, #b8952a, #d4af50);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(184,149,42,0.35);
        }

        .btn-secondary {
            background: transparent;
            color: var(--ink);
            border: 1.5px solid rgba(26,23,16,0.2);
        }

        .btn-secondary:hover {
            background: var(--ink);
            color: white;
            border-color: var(--ink);
            transform: translateY(-2px);
        }

        footer {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: var(--deep);
            color: rgba(255,255,255,0.35);
            padding: 18px 8%;
            text-align: center;
            font-size: 0.82rem;
        }

        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 768px) {
            nav { padding: 14px 5%; }
        }
    </style>
</head>
<body>

<nav>
    <a href="index.html"><img src="logo.png" alt="Puls mladih logo"></a>
    <a href="index.html" class="nav-back">← Početna</a>
</nav>

<div class="content">
    <div class="error-number">404</div>
    <h1 class="error-title">Stranica nije pronađena</h1>
    <p class="error-desc">Ups! Stranica koju tražiš ne postoji ili je premještena. Ne brini — odvedi te natrag na pravo mjesto.</p>
    <div class="buttons">
        <a href="index.html" class="btn btn-primary">← Natrag na početnu</a>
        <a href="index.html#novosti" class="btn btn-secondary">Pogledaj novosti</a>
    </div>
</div>

<footer>
    © 2026. Puls mladih — Ritam mladih koji vodi do promjene.
</footer>

</body>
</html>
